name: ninjakids
description: NinjaKids - AI-Powered Educational Gaming App for Kids
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.3
  confetti: ^0.7.0
  google_fonts: ^6.1.0
  fl_chart: ^0.65.0
  shared_preferences: ^2.3.2
  uuid: ^4.2.2
  pin_code_fields: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/placeholder.png
    - assets/images/app_icon.png
    - assets/images/logo.png
    - assets/lottie/loading.json
