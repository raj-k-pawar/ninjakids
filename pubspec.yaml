name: ninjkids
description: NinjaKids - AI-Powered Educational Gaming App for Kids

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.7.4
  firebase_crashlytics: ^3.4.9

  # Navigation
  go_router: ^12.1.3

  # Networking & HTTP
  http: ^1.1.0
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI & Animations
  lottie: ^3.0.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9

  # Audio & Voice
  flutter_tts: ^3.8.5
  speech_to_text: ^6.6.0
  just_audio: ^0.9.36
  # record: ^5.0.4  # removed: record_linux platform interface broken

  # Charts & Analytics
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^23.1.44

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.12.0

  # Image & Avatar
  image_picker: ^1.0.7
  avatar_glow: ^3.0.0

  # Connectivity & Utils
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1
  intl: ^0.18.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  uuid: ^4.2.2
  rxdart: ^0.27.7
  collection: ^1.18.0
  path_provider: ^2.1.2
  url_launcher: ^6.2.4

  # Notifications
  flutter_local_notifications: ^16.3.0

  # Ads (Reward Ads)
  google_mobile_ads: ^4.0.0

  # Subscriptions / Purchases
  in_app_purchase: ^3.1.13

  # App Icon & Splash
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

  # Confetti & Fun
  confetti: ^0.7.0
  audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  mockito: ^5.4.4
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  # Fonts: add .ttf files to assets/fonts/ then uncomment below
  # fonts:
  #   - family: Nunito
  #     fonts:
  #       - asset: assets/fonts/Nunito-Regular.ttf
  #       - asset: assets/fonts/Nunito-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Nunito-ExtraBold.ttf
  #         weight: 800
  #   - family: FredokaOne
  #     fonts:
  #       - asset: assets/fonts/FredokaOne-Regular.ttf

# flutter_launcher_icons: (configure after adding assets/icons/app_icon.png)
# flutter_native_splash: (configure after adding assets/images/splash_logo.png)