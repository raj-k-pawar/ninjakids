plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
    id "com.google.firebase.crashlytics"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader -> localProperties.load(reader) }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader("UTF-8") { reader -> keystoreProperties.load(reader) }
}

configurations.all {
    resolutionStrategy {
        // Force-exclude play-services-ads-lite which conflicts with
        // play-services-measurement-api (AD_SERVICES_CONFIG manifest merger)
        exclude group: "com.google.android.gms", module: "play-services-ads-lite"
        exclude group: "com.google.android.gms", module: "play-services-ads-identifier"
    }
}

android {
    namespace "com.ninjkids.app"
    compileSdk 36
    ndkVersion "28.2.13676358"

    compileOptions {
        // Required by flutter_local_notifications and other plugins
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "com.ninjkids.app"
        minSdk 21
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias       keystoreProperties["keyAlias"]
                keyPassword    keystoreProperties["keyPassword"]
                storeFile      file(keystoreProperties["storeFile"])
                storePassword  keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        debug {
            // No applicationIdSuffix — keeps package name as com.ninjkids.app
            // so google-services.json doesn't need a separate debug client entry
            versionNameSuffix "-debug"
        }
        release {
            signingConfig keystorePropertiesFile.exists()
                ? signingConfigs.release
                : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    // Core library desugaring — required by flutter_local_notifications
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"

    // Kotlin stdlib provided by Flutter built-in Kotlin support
    implementation "androidx.multidex:multidex:2.0.1"
    implementation platform("com.google.firebase:firebase-bom:33.7.0")
    implementation "com.google.firebase:firebase-analytics"
    implementation "com.google.firebase:firebase-crashlytics"
}
